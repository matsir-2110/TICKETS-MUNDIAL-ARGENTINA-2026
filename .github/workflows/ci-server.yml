name: CI - Server (NestJS)

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/ci-server.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/ci-server.yml'

defaults:
  run:
    working-directory: server

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar que existe package.json
        id: check
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavía, saltando CI del servidor."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configurar Node.js ${{ matrix.node-version }}
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        if: steps.check.outputs.skip == 'false'
        run: npm install

      - name: Lint
        if: steps.check.outputs.skip == 'false'
        run: npm run lint

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build

  test:
    name: Tests unitarios
    runs-on: ubuntu-latest
    needs: lint-and-build

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar que existe package.json
        id: check
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavía, saltando tests del servidor."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configurar Node.js ${{ matrix.node-version }}
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        if: steps.check.outputs.skip == 'false'
        run: npm install

      - name: Ejecutar tests unitarios
        if: steps.check.outputs.skip == 'false'
        run: npm run test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  test-e2e:
    name: Tests E2E
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar que existe package.json
        id: check
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavía, saltando tests E2E."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configurar Node.js ${{ matrix.node-version }}
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        if: steps.check.outputs.skip == 'false'
        run: npm install

      - name: Ejecutar tests E2E
        if: steps.check.outputs.skip == 'false'
        run: npm run test:e2e
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
