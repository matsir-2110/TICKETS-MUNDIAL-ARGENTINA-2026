name: CI - Client (Next.js)

on:
  push:
    branches: [main, develop]
    paths:
      - 'client/**'
      - '.github/workflows/ci-client.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'client/**'
      - '.github/workflows/ci-client.yml'

defaults:
  run:
    working-directory: client

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    if: hashFiles('client/package.json') != ''

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: hashFiles('client/package.json') != ''

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests
        run: npm test -- --passWithNoTests --watchAll=false
