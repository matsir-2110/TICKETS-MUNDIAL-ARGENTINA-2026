name: CI - Client (Next.js)

on:
  push:
    branches: [main, develop]
    paths:
      - 'client/**'
      - '.github/workflows/ci-client.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'client/**'
      - '.github/workflows/ci-client.yml'

defaults:
  run:
    working-directory: client

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar que existe package.json
        id: check
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavía, saltando CI del cliente."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configurar Node.js ${{ matrix.node-version }}
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        if: steps.check.outputs.skip == 'false'
        run: npm install

      - name: Lint
        if: steps.check.outputs.skip == 'false'
        run: npm run lint

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar que existe package.json
        id: check
        run: |
          if [ ! -f package.json ]; then
            echo "No hay package.json todavía, saltando tests del cliente."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configurar Node.js ${{ matrix.node-version }}
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Instalar dependencias
        if: steps.check.outputs.skip == 'false'
        run: npm install

      - name: Ejecutar tests
        if: steps.check.outputs.skip == 'false'
        run: npm test -- --passWithNoTests --watchAll=false
